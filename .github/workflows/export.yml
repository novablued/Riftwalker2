name: Export Nova Web - COPY FIX
on:
  workflow_dispatch:
jobs:
  export:
    runs-on: ubuntu-latest
    container: barichello/godot-ci:4.2.1
    steps:
      - uses: actions/checkout@v4
      
      - name: Copy Templates to Github User
        run: |
          echo "=== CREATING DIR ==="
          mkdir -p /github/home/.local/share/godot/export_templates/4.2.1.stable
          echo "=== COPYING ==="
          cp -v /root/.local/share/godot/export_templates/4.2.1.stable/web* /github/home/.local/share/godot/export_templates/4.2.1.stable/
          echo "=== VERIFY COPY ==="
          ls -la /github/home/.local/share/godot/export_templates/4.2.1.stable/web*
          
      - name: Import + Export Nova
        run: |
          echo "=== IMPORT ==="
          godot --headless --verbose --editor --path nova --quit
          echo "=== EXPORT ==="
          mkdir -p nova/build/web
          godot --headless --verbose --path nova --export-release "Web" nova/build/web/index.html
          echo "=== RESULTS ==="
          ls -la nova/build/web/
          test -f nova/build/web/index.html || exit 1
          
      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Nova-Web-Offline
          path: nova/build/web
