name: Export Nova Web
on: [workflow_dispatch]

jobs:
  export:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.2.1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Import
        run: |
          mkdir -p nova/.godot
          godot --headless --path nova --editor --quit

      - name: Export Web
        run: |
          mkdir -p nova/build/web
          godot --headless --path nova --export-release "web" build/web/index.html

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Godot Web Export
          path: nova/build/web
