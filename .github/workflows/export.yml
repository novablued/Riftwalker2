name: Export Nova Web - Fixed
on: [workflow_dispatch]

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: barichello/godot-ci:4.2.1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Export Templates
        run: |
          apt-get update -qq && apt-get install -y -qq wget unzip dos2unix
          mkdir -p /root/.local/share/godot/export_templates/4.2.1.stable
          cd /tmp
          wget -q https://github.com/godotengine/godot-builds/releases/download/4.2.1-stable/Godot_v4.2.1-stable_export_templates.tpz
          unzip -q Godot_v4.2.1-stable_export_templates.tpz
          mv templates/* /root/.local/share/godot/export_templates/4.2.1.stable/

      - name: Fix Line Endings + Verify Preset
        run: |
          cd nova
          dos2unix export_presets.cfg
          echo "=== Preset name check ==="
          grep "name=" export_presets.cfg
          echo "=== Preset platform check ==="
          grep "platform=" export_presets.cfg

      - name: Import Project
        run: |
          cd nova
          godot --headless --editor --quit --verbose

      - name: Export Debug
        run: |
          cd nova
          mkdir -p build/web
          echo "=== DEBUG EXPORT START ==="
          godot --headless --export-debug "web" build/web/index.html --verbose
          echo "=== Files after debug ==="
          ls -la build/web/

      - name: Export Release
        run: |
          cd nova
          rm -rf build/web/*
          mkdir -p build/web
          echo "=== RELEASE EXPORT START ==="
          godot --headless --export-release "web" build/web/index.html --verbose
          echo "=== Final files ==="
          ls -la build/web/
          test -f build/web/index.html

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Nova-Web-Offline
          path: nova/build/web
          retention-days: 1
