name: Export Nova Web - Fixed

on:
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    container: barichello/godot-ci:4.2.1
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Templates
        run: |
          mkdir -p /root/.local/share/godot/export_templates/4.2.1.stable
          wget -q https://github.com/godotengine/godot/releases/download/4.2.1-stable/Godot_v4.2.1-stable_export_templates.tpz
          unzip -q Godot_v4.2.1-stable_export_templates.tpz
          mv templates/* /root/.local/share/godot/export_templates/4.2.1.stable/
          
      - name: Fix Line Endings + Verify Preset
        run: |
          cd nova
          sed -i 's/\r$//' export_presets.cfg
          echo "=== Preset Content ==="
          cat export_presets.cfg
          echo "=== Checking export_path ==="
          grep "export_path=" export_presets.cfg
          
      - name: Import Project
        run: |
          cd nova
          godot --headless --editor --quit
          
      - name: Export Debug
        run: |
          cd nova
          mkdir -p build/web
          godot --headless --verbose --export-debug "web"
          echo "=== Files after debug ==="
          ls -la build/web/
          
      - name: Export Release
        run: |
          cd nova
          godot --headless --verbose --export-release "web"
          echo "=== Final files ==="
          ls -la build/web/
          test -f build/web/index.html
          
      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Nova-Web-Offline
          path: nova/build/web
