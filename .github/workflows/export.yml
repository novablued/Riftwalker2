name: Export Nova Web - FINAL
on:
  workflow_dispatch:
jobs:
  export:
    runs-on: ubuntu-latest
    container: barichello/godot-ci:4.2.1
    steps:
      - uses: actions/checkout@v4
      
      - name: Copy Templates to Github User
        run: |
          echo "=== COPYING TEMPLATES ==="
          mkdir -p /github/home/.local/share/godot/export_templates
          cp -r /root/.local/share/godot/export_templates/4.2.1.stable /github/home/.local/share/godot/export_templates/
          echo "=== TEMPLATES COPIED ==="
          ls -la /github/home/.local/share/godot/export_templates/4.2.1.stable/
          
      - name: Import + Export Nova
        run: |
          cd nova
          sed -i 's/\r$//' export_presets.cfg
          godot --headless --verbose --editor --quit
          mkdir -p build/web
          godot --headless --verbose --export-release "web" build/web/index.html
          echo "=== EXPORTED FILES ==="
          ls -la build/web/
          test -f build/web/index.html
          
      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Nova-Web-Offline
          path: nova/build/web
