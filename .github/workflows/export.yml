name: Export Nova Web - Test

on:
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    container: barichello/godot-ci:4.2.1
    steps:
      - uses: actions/checkout@v4

      - name: Create Minimal Project
        run: |
          mkdir -p test_project
          echo '[application]' > test_project/project.godot
          echo 'config/name="Test"' >> test_project/project.godot
          echo 'run/main_scene=""' >> test_project/project.godot
          echo 'config/features=PackedStringArray("4.2")' >> test_project/project.godot

      - name: Create Minimal Preset
        run: |
          cd test_project
          echo '[preset.0]' > export_presets.cfg
          echo 'name="web"' >> export_presets.cfg
          echo 'platform="Web"' >> export_presets.cfg
          echo 'runnable=true' >> export_presets.cfg
          echo 'enabled=true' >> export_presets.cfg
          echo 'export_path="build/index.html"' >> export_presets.cfg

      - name: Install Templates
        run: |
          mkdir -p /root/.local/share/godot/export_templates/4.2.1.stable
          wget -q https://github.com/godotengine/godot/releases/download/4.2.1-stable/Godot_v4.2.1-stable_export_templates.tpz
          unzip -q Godot_v4.2.1-stable_export_templates.tpz
          mv templates/* /root/.local/share/godot/export_templates/4.2.1.stable/

      - name: Export Test Project
        run: |
          cd test_project
          mkdir -p build
          godot --headless --verbose --export-release "web" build/index.html
          echo "=== Files ==="
          ls -la build/

      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Test-Export
          path: test_project/build
