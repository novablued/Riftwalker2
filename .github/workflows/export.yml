name: Export Nova Web - FIND PRESET
on:
  workflow_dispatch:
jobs:
  export:
    runs-on: ubuntu-latest
    container: barichello/godot-ci:4.2.1
    steps:
      - uses: actions/checkout@v4
      
      - name: Copy Templates
        run: |
          mkdir -p /github/home/.local/share/godot/export_templates/4.2.1.stable
          cp -v /root/.local/share/godot/export_templates/4.2.1.stable/web* /github/home/.local/share/godot/export_templates/4.2.1.stable/
          ls -la /github/home/.local/share/godot/export_templates/4.2.1.stable/web*
          
      - name: List Export Presets
        run: |
          echo "=== YOUR PRESET NAMES ==="
          cat nova/export_presets.cfg | grep "name="
          
      - name: Import + Export Nova
        run: |
          godot --headless --editor --path nova --quit
          mkdir -p nova/build/web
          godot --headless --path nova --export-release "Web" nova/build/web/index.html || true
          echo "=== RESULTS ==="
          ls -la nova/build/web/
