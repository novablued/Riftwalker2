name: Export Nova Web - NUCLEAR
on:
  workflow_dispatch:
jobs:
  export:
    runs-on: ubuntu-latest
    container: barichello/godot-ci:4.2.1
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Templates + Env
        env:
          HOME: /github/home
        run: |
          mkdir -p $HOME/.local/share/godot/export_templates/4.2.1.stable
          cp -v /root/.local/share/godot/export_templates/4.2.1.stable/web* $HOME/.local/share/godot/export_templates/4.2.1.stable/
          ls -la $HOME/.local/share/godot/export_templates/4.2.1.stable/web*
          
      - name: Force Import + Export
        env:
          HOME: /github/home
        run: |
          cd nova
          rm -rf .godot/
          godot --headless --verbose --editor --quit-after 20
          mkdir -p build/web
          godot --headless --verbose --export-release "web" build/web/index.html
          echo "=== NOVA FILES ==="
          ls -la build/web/
          test -f build/web/index.wasm
          
      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Nova-Web-Offline
          path: nova/build/web
