name: Export Nova Web - FINAL BOSS
on:
  workflow_dispatch:
jobs:
  export:
    runs-on: ubuntu-latest
    container: barichello/godot-ci:4.2.1
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Templates + Env
        run: |
          export HOME=/github/home
          mkdir -p $HOME/.local/share/godot/export_templates/4.2.1.stable
          cp -v /root/.local/share/godot/export_templates/4.2.1.stable/web* $HOME/.local/share/godot/export_templates/4.2.1.stable/
          echo "=== TEMPLATES ==="
          ls -la $HOME/.local/share/godot/export_templates/4.2.1.stable/web*
          
      - name: Show Export Preset Config
        run: |
          echo "=== YOUR export_presets.cfg ==="
          cat nova/export_presets.cfg
          
      - name: Import Project
        env:
          HOME: /github/home
        run: |
          godot --headless --verbose --editor --path nova --quit
          
      - name: Export Nova
        env:
          HOME: /github/home
        run: |
          mkdir -p nova/build/web
          godot --headless --verbose --path nova --export-release "web" nova/build/web/index.html
          echo "=== EXPORTED FILES ==="
          ls -la nova/build/web/
          test -f nova/build/web/index.wasm
          
      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Nova-Web-Offline
          path: nova/build/web
