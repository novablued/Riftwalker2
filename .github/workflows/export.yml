name: Export Nova Web - Final
on: [workflow_dispatch]

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: barichello/godot-ci:4.2.1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Export Templates
        run: |
          apt-get update -qq && apt-get install -y -qq wget unzip
          mkdir -p /root/.local/share/godot/export_templates/4.2.1.stable
          cd /tmp
          wget -q https://github.com/godotengine/godot-builds/releases/download/4.2.1-stable/Godot_v4.2.1-stable_export_templates.tpz
          unzip -q Godot_v4.2.1-stable_export_templates.tpz
          mv templates/* /root/.local/share/godot/export_templates/4.2.1.stable/

      - name: Import Project
        run: |
          cd nova
          echo "=== Importing assets ==="
          godot --headless --editor --quit --verbose
          echo "=== .godot folder contents ==="
          ls -la .godot/

      - name: Export Web
        run: |
          cd nova
          mkdir -p build/web
          echo "=== Exporting ==="
          godot --headless --export-release "web" build/web/index.html --verbose
          echo "=== Files created ==="
          ls -la build/web/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nova-Web-Offline
          path: nova/build/web
          retention-days: 1
