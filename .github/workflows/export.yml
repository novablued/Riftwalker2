name: Export Nova - Find Broken File

on:
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    container: barichello/godot-ci:4.2.1
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Templates
        run: |
          mkdir -p /root/.local/share/godot/export_templates/4.2.1.stable
          wget -q https://github.com/godotengine/godot/releases/download/4.2.1-stable/Godot_v4.2.1-stable_export_templates.tpz
          unzip -q Godot_v4.2.1-stable_export_templates.tpz
          mv templates/* /root/.local/share/godot/export_templates/4.2.1.stable/
          
      - name: Import Project + Show Errors
        run: |
          cd nova
          sed -i 's/\r$//' export_presets.cfg
          echo "=== STARTING IMPORT - ERRORS WILL SHOW BELOW ==="
          godot --headless --verbose --editor --quit || true
          echo "=== IMPORT DONE ==="
          
      - name: Try Export + Capture Error
        run: |
          cd nova
          mkdir -p build/web
          echo "=== STARTING EXPORT - REAL ERROR BELOW ==="
          godot --headless --verbose --export-debug "web" build/web/index.html || true
          echo "=== EXPORT ATTEMPT DONE ==="
          echo "=== FILES CREATED ==="
          ls -la build/web/ || echo "No files"
