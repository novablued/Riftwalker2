name: Build Android APK

on:
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Export Android APK
        uses: firebelley/godot-export@v6.0.0
        with:
          godot-version: 4.2.1
          project-path: nova
          export-presets-path: nova/export_presets.cfg
          export-name: riftwalker
          relative-project-path: nova

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: riftwalker-android
          path: nova/builds/riftwalker.apk
