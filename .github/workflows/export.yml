name: Export Nova Web
on: workflow_dispatch
jobs:
  export-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nova
    steps:
      - uses: actions/checkout@v4
      - uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.3.0
          include-templates: true
          use-dotnet: false
      
      - name: Clean cache
        run: rm -rf .godot
        
      - name: Import project assets
        run: godot --headless --audio-driver Dummy --import --quit --quit-after 1
        
      - name: Build directories  
        run: mkdir -p build/web
        
      - name: Export Web
        run: godot --headless --audio-driver Dummy --export-release Web build/web/index.html
        
      - uses: actions/upload-artifact@v4
        with:
          name: Godot Web Export
          path: nova/build/web
