name: Export Nova Web
on: workflow_dispatch
jobs:
  export:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.3
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Templates
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates
          mv /root/.local/share/godot/export_templates/4.3.stable ~/.local/share/godot/export_templates/4.3.stable
          
      - name: Nuke Everything + Fix Files
        run: |
          export HOME=/tmp/godot_home
          mkdir -p $HOME
          apt-get update && apt-get install -y dos2unix
          find nova -type f \( -name "*.cfg" -o -name "*.godot" -o -name "*.tscn" -o -name "*.tres" -o -name "*.gd" \) -exec dos2unix {} \;
          rm -rf nova/.godot
          rm -rf nova/.import
          find nova -name "*.import" -delete
          
      - name: Import
        run: |
          export HOME=/tmp/godot_home
          cd nova
          godot --headless --display-driver headless --path . --editor --quit
          
      - name: Export Web
        run: |
          export HOME=/tmp/godot_home
          cd nova
          mkdir -p /tmp/web
          godot --headless --display-driver headless --path . --export-release "web" /tmp/web/index.html
          
      - name: Move Build
        run: |
          mkdir -p nova/build/web
          mv /tmp/web/* nova/build/web/
          
      - uses: actions/upload-artifact@v4
        with:
          name: Godot Web Export
          path: nova/build/web
