name: Export Nova Web
on: workflow_dispatch
jobs:
  export:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.2.1
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Templates
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates
          mv /root/.local/share/godot/export_templates/4.2.1.stable ~/.local/share/godot/export_templates/4.2.1.stable
          
      - name: Fix Line Endings + Clean Cache
        run: |
          apt-get update && apt-get install -y dos2unix
          find nova -type f \( -name "*.cfg" -o -name "*.godot" -o -name "*.tscn" -o -name "*.tres" -o -name "*.gd" \) -exec dos2unix {} \;
          rm -rf nova/.godot
          rm -rf nova/.import
          find nova -name "*.import" -delete
          
      - name: Import
        run: |
          cd nova
          godot --headless --verbose --editor --quit
          
      - name: Export Web
        run: |
          cd nova
          mkdir -p /tmp/web
          godot --headless --verbose --export-release "web" /tmp/web/index.html
          
      - name: Move Build
        run: |
          mkdir -p nova/build/web
          mv /tmp/web/* nova/build/web/
          
      - uses: actions/upload-artifact@v4
        with:
          name: Godot Web Export
          path: nova/build/web
