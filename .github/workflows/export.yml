name: Export Nova Web - SHIP IT
on:
  workflow_dispatch:
jobs:
  export:
    runs-on: ubuntu-latest
    container: barichello/godot-ci:4.2.1
    steps:
      - uses: actions/checkout@v4
      
      - name: Copy Templates
        run: |
          mkdir -p /github/home/.local/share/godot/export_templates/4.2.1.stable
          cp -v /root/.local/share/godot/export_templates/4.2.1.stable/web* /github/home/.local/share/godot/export_templates/4.2.1.stable/
          
      - name: Import + Export Nova
        run: |
          godot --headless --editor --path nova --quit
          mkdir -p nova/build/web
          godot --headless --path nova --export-release "web" nova/build/web/index.html
          echo "=== EXPORTED FILES ==="
          ls -la nova/build/web/
          test -f nova/build/web/index.html
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nova-Web-Offline
          path: nova/build/web
